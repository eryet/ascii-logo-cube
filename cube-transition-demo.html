<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASCII Logo Cube — Transition Demo</title>
  <style>
    :root {
      --bg: #EDE9DE;
      --dot: #ac9f85;
      --logo: hsl(14.8, 63.1%, 59.6%);
      --text: #5b5647;
      --muted: #8c8676;
      --panel: #e3ddcd;
      --border: #d3ccb8;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Cascadia Code", "SFMono-Regular", Menlo, Consolas, monospace;
      overflow: hidden;
      transition: background .35s ease, color .35s ease;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      user-select: none;
    }

    pre#screen {
      margin: 0;
      line-height: 1.0;
      font-size: 5px;
      letter-spacing: 0.4em;
      white-space: pre;
      font-weight: 400;
      transform: scale(2);
      transform-origin: center center;
      touch-action: none;
    }

    pre#screen .d {
      color: var(--dot);
    }

    /* cube surface dots */
    pre#screen .l {
      color: var(--logo);
    }

    /* logo, in its brand color */

    #ui {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .seg {
      display: inline-flex;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 2px;
      gap: 2px;
    }

    .seg button {
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      border: 0;
      border-radius: 7px;
      padding: 5px 14px;
      transition: all .2s ease;
    }

    .seg button.on {
      background: var(--logo);
      color: var(--bg);
      font-weight: 700;
    }

    .sz {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 12px;
      color: var(--muted);
    }

    .sz input[type=range] {
      width: 150px;
      accent-color: var(--logo);
      cursor: pointer;
    }

    .hint {
      font-size: 12.5px;
      color: var(--muted);
      letter-spacing: .4px;
    }

    .hint b {
      color: var(--text);
    }

    kbd {
      background: var(--panel);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 5px;
      padding: 1px 6px;
      color: var(--text);
      font-size: 12px;
      margin: 0 1px;
    }
  </style>
</head>

<body>
  <pre id="screen" aria-label="rotating ascii logo cube"></pre>
  <div id="ui">
    <div class="row">
      <div class="seg" id="seg">
        <button data-logo="claude" class="on">Claude</button>
        <button data-logo="openai">OpenAI</button>
        <button data-logo="cute">Cute</button>
      </div>
      <label class="sz">size <input id="size" type="range" min="0.5" max="2.5" step="0.01" value="2"></label>
    </div>
    <div class="row">
      <span class="sz">transition</span>
      <div class="seg" id="styleSeg">
        <button data-style="rubik" class="on">Rubik</button>
        <button data-style="shatter">Shatter</button>
        <button data-style="vortex">Vortex</button>
        <button data-style="rain">Rain</button>
        <button data-style="wipe">Wipe</button>
        <button data-style="develop">Develop</button>
        <button data-style="ripple">Ripple</button>
        <button data-style="glitch">Glitch</button>
      </div>
      <div class="seg"><button id="replay">&#8635; replay</button></div>
    </div>
    <div class="hint">
      <b>drag</b> to rotate
      &nbsp;&middot;&nbsp; <kbd>&larr;</kbd><kbd>&rarr;</kbd><kbd>&uarr;</kbd><kbd>&darr;</kbd> rotate
      &nbsp;&middot;&nbsp; <kbd>Space</kbd> auto-spin
      &nbsp;&middot;&nbsp; <kbd>R</kbd> reset
    </div>
  </div>

      // ---- logo texture state (rebuilt when switching logos) ----
      let TEXW = 1, TEXH = 1, MASK = new Uint8Array(1);
      let LCOL = new Int32Array(1);   // per-texel packed RGB color (for image logos)
      let colorMode = false;          // true when the active logo is a full-color image
      let LOGO_HALF_X = 0.68, LOGO_HALF_Y = 0.68;

      // build a flat (single-colour) logo texture from an SVG path -> returns a tex object
      function buildLogo(cfg) {
        const S = 256;
        const cv = document.createElement('canvas');
        cv.width = S; cv.height = S;
        const ctx = cv.getContext('2d');
        ctx.clearRect(0, 0, S, S);
        ctx.scale(S / cfg.vb, S / cfg.vb);   // path lives in a 0..vb box
        ctx.fillStyle = '#000';
        ctx.fill(new Path2D(cfg.path), cfg.fillRule);
        const d = ctx.getImageData(0, 0, S, S).data;
        let minx = S, miny = S, maxx = 0, maxy = 0;  // crop to ink bounding box
        for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
          if (d[(y * S + x) * 4 + 3] > 110) {
            if (x < minx) minx = x; if (x > maxx) maxx = x;
            if (y < miny) miny = y; if (y > maxy) maxy = y;
          }
        }
        const tw = maxx - minx + 1, th = maxy - miny + 1;
        const mask = new Uint8Array(tw * th);
        for (let y = 0; y < th; y++) for (let x = 0; x < tw; x++) {
          mask[y * tw + x] = d[((y + miny) * S + (x + minx)) * 4 + 3] > 110 ? 1 : 0;
        }
        return {
          TEXW: tw, TEXH: th, MASK: mask, LCOL: new Int32Array(1), colorMode: false,
          LOGO_HALF_X: cfg.half, LOGO_HALF_Y: cfg.half * th / tw
        };
      }

      // build a full-colour logo texture from a raster image (keeps the artwork's colours)
      // async: calls done(tex) once the image has loaded
      function buildLogoFromImage(cfg, done) {
        const img = new Image();
        img.onload = () => {
          const S = 200;
          const cv = document.createElement('canvas');
          cv.width = S; cv.height = S;
          const ctx = cv.getContext('2d');
          ctx.clearRect(0, 0, S, S);
          let iw = img.naturalWidth || S, ih = img.naturalHeight || S;
          const sc = Math.min(S / iw, S / ih), dw = iw * sc, dh = ih * sc;
          ctx.drawImage(img, (S - dw) / 2, (S - dh) / 2, dw, dh);
          const d = ctx.getImageData(0, 0, S, S).data;
          // figure out the background (transparent, or the corner color)
          const total = S * S; let trans = 0;
          for (let i = 0; i < total; i++) if (d[i * 4 + 3] < 40) trans++;
          const hasAlpha = trans > total * 0.10;
          let bg = [0, 0, 0];
          if (!hasAlpha) {
            const c = (x, y) => { const i = (y * S + x) * 4; return [d[i], d[i + 1], d[i + 2]]; };
            const cs = [c(2, 2), c(S - 3, 2), c(2, S - 3), c(S - 3, S - 3)];
            bg = [0, 1, 2].map(k => (cs[0][k] + cs[1][k] + cs[2][k] + cs[3][k]) / 4);
          }
          const ink = (i) => {
            const a = d[i * 4 + 3];
            if (hasAlpha) return a > 70;
            if (a < 70) return false;
            const dr = d[i * 4] - bg[0], dg = d[i * 4 + 1] - bg[1], db = d[i * 4 + 2] - bg[2];
            return dr * dr + dg * dg + db * db > 2200;
          };
          let minx = S, miny = S, maxx = 0, maxy = 0;
          for (let y = 0; y < S; y++) for (let x = 0; x < S; x++)
            if (ink(y * S + x)) { if (x < minx) minx = x; if (x > maxx) maxx = x; if (y < miny) miny = y; if (y > maxy) maxy = y; }
          if (maxx < minx) return;
          const w = maxx - minx + 1, h = maxy - miny + 1;
          const mask = new Uint8Array(w * h);
          const lcol = new Int32Array(w * h);
          const q = (v) => v & 0xF0;   // quantize colors so flat regions form long runs
          for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
            const i = (y + miny) * S + (x + minx);
            if (!ink(i)) continue;
            mask[y * w + x] = 1;
            lcol[y * w + x] = (q(d[i * 4]) << 16) | (q(d[i * 4 + 1]) << 8) | q(d[i * 4 + 2]);
          }
          done({
            TEXW: w, TEXH: h, MASK: mask, LCOL: lcol, colorMode: true,
            LOGO_HALF_X: cfg.half, LOGO_HALF_Y: cfg.half * h / w
          });
        };
        img.src = cfg.img;
      }

      // ---- texture cache: build each logo once, swap instantly (no flash) ----
      const TEX_CACHE = {};
      function applyTex(t) {
        TEXW = t.TEXW; TEXH = t.TEXH; MASK = t.MASK; LCOL = t.LCOL;
        colorMode = t.colorMode; LOGO_HALF_X = t.LOGO_HALF_X; LOGO_HALF_Y = t.LOGO_HALF_Y;
      }
      // snapshot the active texture into an object, so we can keep sampling it mid-transition
      function captureTex() {
        return { TEXW, TEXH, MASK, LCOL, colorMode, LOGO_HALF_X, LOGO_HALF_Y };
      }
      function preload(key, cb) {
        const cfg = LOGOS[key];
        if (cfg.img) buildLogoFromImage(cfg, t => { TEX_CACHE[key] = t; if (cb) cb(t); });
        else { TEX_CACHE[key] = buildLogo(cfg); if (cb) cb(TEX_CACHE[key]); }
      }

      // returns -1 = no logo here, -2 = flat logo (use the .l brand color), else a packed RGB color
      const logoAt = (u, v) => {
        if (u < -LOGO_HALF_X || u > LOGO_HALF_X || v < -LOGO_HALF_Y || v > LOGO_HALF_Y) return -1;
        let tx = (u / LOGO_HALF_X + 1) * 0.5 * TEXW | 0;
        let ty = (1 - v / LOGO_HALF_Y) * 0.5 * TEXH | 0;
        if (tx < 0) tx = 0; else if (tx >= TEXW) tx = TEXW - 1;
        if (ty < 0) ty = 0; else if (ty >= TEXH) ty = TEXH - 1;
        const i = ty * TEXW + tx;
        if (MASK[i] !== 1) return -1;
        return colorMode ? LCOL[i] : -2;
      };

      // sample an arbitrary cached texture (used to read BOTH logos during a transition)
      const logoAtTex = (t, u, v) => {
        if (u < -t.LOGO_HALF_X || u > t.LOGO_HALF_X || v < -t.LOGO_HALF_Y || v > t.LOGO_HALF_Y) return -1;
        let tx = (u / t.LOGO_HALF_X + 1) * 0.5 * t.TEXW | 0;
        let ty = (1 - v / t.LOGO_HALF_Y) * 0.5 * t.TEXH | 0;
        if (tx < 0) tx = 0; else if (tx >= t.TEXW) tx = t.TEXW - 1;
        if (ty < 0) ty = 0; else if (ty >= t.TEXH) ty = t.TEXH - 1;
        const i = ty * t.TEXW + tx;
        if (t.MASK[i] !== 1) return -1;
        return t.colorMode ? t.LCOL[i] : -2;
      };

      const wrap = (key, text) => {
        if (!key) return text;
        if (key === 'd') return '<span class="d">' + text + '</span>';
        if (key === 'l') return '<span class="l">' + text + '</span>';
        return '<span style="color:' + key + '">' + text + '</span>';
      };

      function applyTheme(t) {
        const r = document.documentElement.style;
        r.setProperty('--bg', t.bg); r.setProperty('--dot', t.dot);
        r.setProperty('--logo', t.logo); r.setProperty('--text', t.text);
        r.setProperty('--muted', t.muted); r.setProperty('--panel', t.panel);
        r.setProperty('--border', t.border);
      }

      // ---- switching logos, with a per-character dissolve transition ----
      let transitioning = false, transStart = 0, transP = 0, currentKey = null;
      let oldTexObj = null, newTexObj = null;

      function markActive(key) {
        for (const b of document.querySelectorAll('#seg button'))
          b.classList.toggle('on', b.dataset.logo === key);
      }
      function setLogo(key, animate) {
        if (key === currentKey || transitioning) return;
        const start = (tex) => {
          if (!animate) {                  // initial load: instant
            applyTex(tex); applyTheme(LOGOS[key].theme); markActive(key); currentKey = key;
            return;
          }
          oldTexObj = captureTex();        // keep the outgoing logo to sample during the transition
          newTexObj = tex;
          applyTex(tex);                   // active = new (sampled by revealed cells, and after)
          if (currentStyle !== 'rubik') applyTheme(LOGOS[key].theme); // rubik keeps OLD colours, switches at the END
          markActive(key); currentKey = key;
          vYaw += SPIN_IMPULSE;            // a touch of spin for life, not the main event
          transStart = performance.now(); transP = 0; transitioning = true;
        };
        const cached = TEX_CACHE[key];
        if (cached) start(cached); else preload(key, start);
      }

      // ---- ascii framebuffer ----
      const W = 168, H = 140;
      const CX = W / 2, CY = H / 2;
      const K1 = 105;     // projection scale
      const K2 = 5;       // camera distance
      const ASPECT = 1.0; // square cells (line-height 1.0 + letter-spacing 0.4em)
      const STEP = 0.016; // surface sampling resolution
      const DOT = '.', LOGO = '#';
      const out = new Array(W * H);
      const colb = new Uint8Array(W * H);   // 1 = dot, 2 = logo
      const lcolb = new Int32Array(W * H);  // per-cell logo color (-2 flat, else packed RGB)
      const zbuf = new Float32Array(W * H);

      // per-cell ordering: WHEN each screen cell crosses over — one field per style
      const clamp01 = (v) => v < 0 ? 0 : v > 1 ? 1 : v;
      const ORD = {
        wipe: new Float32Array(W * H),     // diagonal sweep
        ripple: new Float32Array(W * H),   // ring from the centre
        glitch: new Float32Array(W * H),   // scattered (random)
        develop: new Float32Array(W * H),  // near-uniform, slight stagger
        rain: new Float32Array(W * H),     // top-down cascade, staggered columns
      };
      const EXT = 42;  // ~half the cube's on-screen span, so the cube fills the 0..1 range
      const colPhase = new Float32Array(W);
      for (let x = 0; x < W; x++) colPhase[x] = Math.random() * 0.5;
      for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
        const i = y * W + x, nx = (x - CX) / EXT, ny = (y - CY) / EXT;
        ORD.wipe[i] = clamp01((nx + ny) * 0.32 + 0.5);
        ORD.ripple[i] = clamp01(Math.hypot(nx, ny) / 1.35);
        ORD.glitch[i] = Math.random();
        ORD.develop[i] = Math.random() * 0.18;
        ORD.rain[i] = clamp01(((y - (CY - 42)) / 84) * 0.72 + colPhase[x] * 0.5);
      }

      const FACES = [
        { p: (u, v) => [1, u, v], n: [1, 0, 0] },
        { p: (u, v) => [-1, u, v], n: [-1, 0, 0] },
        { p: (u, v) => [u, 1, v], n: [0, 1, 0] },
        { p: (u, v) => [u, -1, v], n: [0, -1, 0] },
        { p: (u, v) => [u, v, 1], n: [0, 0, 1] },
        { p: (u, v) => [u, v, -1], n: [0, 0, -1] },
      ];

      // ---- orientation as a 3x3 rotation matrix (trackball) ----
      let m;
      const setIdentity = () => { m = [1, 0, 0, 0, 1, 0, 0, 0, 1]; };
      const rotate = (pitch, yaw) => {
        const cp = Math.cos(pitch), sp = Math.sin(pitch);
        const cy = Math.cos(yaw), sy = Math.sin(yaw);
        const R = [[cy, 0, sy], [sp * sy, cp, -sp * cy], [-cp * sy, sp, cp * cy]];
        const n = new Array(9);
        for (let i = 0; i < 3; i++)
          for (let j = 0; j < 3; j++)
            n[i * 3 + j] = R[i][0] * m[j] + R[i][1] * m[3 + j] + R[i][2] * m[6 + j];
        m = n;
      };
      const ortho = () => {
        let ax = m[0], ay = m[1], az = m[2];
        let la = Math.hypot(ax, ay, az); ax /= la; ay /= la; az /= la;
        let bx = m[3], by = m[4], bz = m[5];
        const dp = bx * ax + by * ay + bz * az;
        bx -= dp * ax; by -= dp * ay; bz -= dp * az;
        let lb = Math.hypot(bx, by, bz); bx /= lb; by /= lb; bz /= lb;
        const cx = ay * bz - az * by, cy = az * bx - ax * bz, cz = ax * by - ay * bx;
        m = [ax, ay, az, bx, by, bz, cx, cy, cz];
      };
      const resetView = () => { setIdentity(); rotate(-0.5, 0.6); };
      resetView();

      // ---- motion state ----
      let vYaw = 0, vPitch = 0;
      let auto = true, dragging = false, lastX = 0, lastY = 0;
      const keys = new Set();
      const FRICTION = 0.92, KEY_ACC = 0.004, AUTO_V = 0.010, DRAG_S = 0.002;
      // ---- logo-change transitions (pick a style with the Transition control) ----
      let currentStyle = 'rubik';
      const TRANS_MS = 2000, SPIN_IMPULSE = 0.08;  // duration + a tiny bit of spin
      const BAND = 0.13;        // moving-edge width for wipe / ripple / glitch / rain
      const DBAND = 0.55;       // soft crossfade width for "develop"
      const RAMP = '.:-=+*#';   // density ramp for "develop" (faint -> solid)
      const RIPPLE_CH = '*o+:.'; // shimmer glyphs for "ripple"
      const GLITCH_CH = '=+*:~-'; // calmer scramble glyphs for "glitch"
      const RAIN_CH = '01<>{}/|=+*'; // cascading glyphs for "rain"
      const hash2 = (x, y) => {       // stable per-cell pseudo-random in [0,1)
        let h = (x * 374761393 + y * 668265263) | 0;
        h = (h ^ (h >>> 13)) * 1274126177 | 0;
        return ((h >>> 0) % 1000) / 1000;
      };
      // "rubik": the cube splits into a 3x3 Rubik's cube (seams open), its 3 layers flick-turn in
      // sequence with a physical "click" (slight overshoot) revealing the new logo, then it merges
      // back solid. Colours stay OLD the whole time; the theme switches only once it has finished.
      // 3 beats: the cube LIFTS into 3 floating slabs, each does a clean quarter-turn WHILE separated
      // (cascading top->bottom), then they DROP back together solid. Colours stay OLD until it ends.
      const RUBIK_WIN = [[0.30, 0.56], [0.39, 0.65], [0.48, 0.74]]; // per-slab turn windows (while lifted), cascaded
      const RUBIK_DIR = [1, -1, 1];                                // alternating turn directions
      const easeOutBack = (x) => { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * (x - 1) ** 3 + c1 * (x - 1) ** 2; };
      const smooth = (x) => x <= 0 ? 0 : x >= 1 ? 1 : x * x * (3 - 2 * x);
      const sepProfile = (t) => t < 0.25 ? smooth(t / 0.25) : t > 0.78 ? smooth((1 - t) / 0.22) : 1; // lift, hold, drop
      const rubikLayer = (y) => y > 0.34 ? 0 : y < -0.34 ? 2 : 1;
      const rubikAngle = (layer, t) => {                           // flick to 90deg -> hold -> flick back
        const w = RUBIK_WIN[layer], lt = (t - w[0]) / (w[1] - w[0]);
        if (lt <= 0 || lt >= 1) return 0;
        const a = lt < 0.4 ? easeOutBack(lt / 0.4) : lt < 0.6 ? 1 : easeOutBack((1 - lt) / 0.4);
        return RUBIK_DIR[layer] * (Math.PI / 2) * a;
      };
      const rubikRevealed = (layer, t) => { const w = RUBIK_WIN[layer]; return t > (w[0] + w[1]) / 2; };

      function render() {
        out.fill(' ');
        zbuf.fill(0);
        const warpOn = transitioning && (currentStyle === 'shatter' || currentStyle === 'vortex');
        const rubikOn = transitioning && currentStyle === 'rubik';
        const sep = rubikOn ? sepProfile(transP) : 0;
        const gapW = sep * 0.06;            // cubie seams open with the lift
        const sepW = sep * 0.46;            // lift the 3 slabs apart vertically
        for (const f of FACES) {
          const nz = m[6] * f.n[0] + m[7] * f.n[1] + m[8] * f.n[2];
          if (nz > 0 && !rubikOn) continue; // backface cull (off during rubik; z-buffer sorts twisted layers)
          for (let u = -1; u <= 1; u += STEP) {
            for (let v = -1; v <= 1; v += STEP) {
              if (gapW && (Math.abs(Math.abs(u) - 0.3333) < gapW || Math.abs(Math.abs(v) - 0.3333) < gapW)) continue; // cubie seams
              const p = f.p(u, v);
              let px = p[0], py = p[1], pz = p[2];
              if (rubikOn) {                        // separate the 3 slabs vertically, each twisting around Y
                const lyr = rubikLayer(py), th = rubikAngle(lyr, transP);
                if (th) { const c = Math.cos(th), s = Math.sin(th), nx = px * c + pz * s; pz = -px * s + pz * c; px = nx; }
                py += lyr === 0 ? sepW : lyr === 2 ? -sepW : 0;
              }
              const wx = m[0] * px + m[1] * py + m[2] * pz;
              const wy = m[3] * px + m[4] * py + m[5] * pz;
              const wz = m[6] * px + m[7] * py + m[8] * pz;
              const ooz = 1 / (wz + K2);
              let sx = CX + K1 * ooz * wx + 0.5;
              let sy = CY - K1 * ooz * ASPECT * wy + 0.5;
              if (warpOn) {                       // shatter / vortex displace the cell's position
                const dx = sx - CX, dy = sy - CY, r = Math.hypot(dx, dy);
                const M = Math.sin(transP * Math.PI);   // 0 -> 1 -> 0 across the transition
                if (currentStyle === 'shatter') {
                  const bx = sx | 0, by = sy | 0;
                  if (hash2(bx, by) > 1 - M * 0.82) continue;   // thin to a sparse cloud at the peak -> gaps
                  const a = hash2(by, bx) * 6.2832;
                  const ux = r ? dx / r : 0, uy = r ? dy / r : 0;
                  const dirx = ux * 0.5 + Math.cos(a) * 0.85, diry = uy * 0.5 + Math.sin(a) * 0.85;
                  const amt = (14 + r * 1.25) * M;
                  sx += dirx * amt; sy += diry * amt;
                } else {                            // vortex
                  const ang = Math.atan2(dy, dx) + M * (1.8 + r * 0.02);
                  const r2 = r * (1 - M * 0.28);
                  sx = CX + Math.cos(ang) * r2; sy = CY + Math.sin(ang) * r2;
                }
              }
              sx |= 0; sy |= 0;
              if (sx < 0 || sx >= W || sy < 0 || sy >= H) continue;
              const idx = sx + sy * W;
              if (ooz > zbuf[idx]) {
                zbuf[idx] = ooz;
                let lc;
                if (transitioning) {
                  if (warpOn) {                                    // shatter / vortex: swap at the peak
                    lc = logoAtTex(transP > 0.5 ? newTexObj : oldTexObj, u, v);
                  } else if (rubikOn) {                            // rubik: each layer's slab flips coherently as it turns edge-on
                    lc = logoAtTex(rubikRevealed(rubikLayer(py), transP) ? newTexObj : oldTexObj, u, v);
                  } else if (currentStyle === 'develop') {
                    const ord = ORD.develop[idx];
                    const front = transP * (1 + DBAND);
                    const lp = (front - ord) / DBAND;          // <0 old, >1 new, between = crossfade
                    if (lp <= 0) lc = logoAtTex(oldTexObj, u, v);
                    else if (lp >= 1) lc = logoAtTex(newTexObj, u, v);
                    else {
                      const tgt = lp < 0.5 ? logoAtTex(oldTexObj, u, v) : logoAtTex(newTexObj, u, v);
                      if (tgt === -1) { out[idx] = DOT; colb[idx] = 1; continue; }
                      const sol = Math.abs(lp - 0.5) * 2;      // solid at the ends, faint mid-cross
                      out[idx] = RAMP[(sol * (RAMP.length - 1) + 0.5) | 0];
                      colb[idx] = 2; lcolb[idx] = tgt;
                      continue;
                    }
                  } else {                                       // wipe / ripple / glitch / rain
                    const ord = ORD[currentStyle][idx];
                    const front = transP * (1 + BAND);
                    if (front < ord) lc = logoAtTex(oldTexObj, u, v);            // still the old logo
                    else if (front > ord + BAND) lc = logoAtTex(newTexObj, u, v); // settled into the new
                    else {                                                       // the moving edge
                      if (currentStyle === 'wipe') out[idx] = LOGO;
                      else if (currentStyle === 'ripple') out[idx] = RIPPLE_CH[(Math.random() * RIPPLE_CH.length) | 0];
                      else if (currentStyle === 'rain') out[idx] = RAIN_CH[(Math.random() * RAIN_CH.length) | 0];
                      else out[idx] = GLITCH_CH[(Math.random() * GLITCH_CH.length) | 0];
                      colb[idx] = 2; lcolb[idx] = -2;          // glow in the new brand colour
                      continue;
                    }
                  }
                } else {
                  lc = logoAt(u, v);
                }
                const lg = lc !== -1;
                out[idx] = lg ? LOGO : DOT;
                colb[idx] = lg ? 2 : 1;
                if (lg) lcolb[idx] = lc;
              }
            }
          }
        }
        // colored output, run-length grouping same-color cells into spans
        let s = '';
        for (let row = 0; row < H; row++) {
          const base = row * W;
          let curKey = null, buf = '';
          for (let col = 0; col < W; col++) {
            const i = base + col;
            const ch = out[i];
            let key;
            if (ch === ' ') key = '';
            else if (colb[i] === 1) key = 'd';
            else { const lc = lcolb[i]; key = lc === -2 ? 'l' : '#' + ('000000' + (lc >>> 0).toString(16)).slice(-6); }
            if (key !== curKey) {
              if (buf) s += wrap(curKey, buf);
              buf = ''; curKey = key;
            }
            buf += ch;
          }
          if (buf) s += wrap(curKey, buf);
          s += '\n';
        }
        screenEl.innerHTML = s;
      }

      function loop() {
        if (transitioning) {
          transP = (performance.now() - transStart) / TRANS_MS;
          if (transP >= 1) {
            transP = 1; transitioning = false;
            if (currentStyle === 'rubik') applyTheme(LOGOS[currentKey].theme); // colour scheme switches AFTER the turns
          }
        }
        if (!dragging) {
          if (keys.has('ArrowLeft')) vYaw -= KEY_ACC;
          if (keys.has('ArrowRight')) vYaw += KEY_ACC;
          if (keys.has('ArrowUp')) vPitch -= KEY_ACC;
          if (keys.has('ArrowDown')) vPitch += KEY_ACC;
          rotate(vPitch, vYaw);
          vYaw *= FRICTION; vPitch *= FRICTION;
          if (auto && keys.size === 0 && Math.abs(vYaw) + Math.abs(vPitch) < AUTO_V) rotate(0, AUTO_V);
        }
        ortho();
        render();
        requestAnimationFrame(loop);
      }

      // ---- keyboard ----
      addEventListener('keydown', (e) => {
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
          keys.add(e.key); e.preventDefault();
        } else if (e.key === ' ') { auto = !auto; e.preventDefault(); }
        else if (e.key === 'r' || e.key === 'R') { resetView(); vYaw = 0; vPitch = 0; }
      });
      addEventListener('keyup', (e) => keys.delete(e.key));

      // ---- drag to rotate (ignore drags that start on the controls) ----
      addEventListener('pointerdown', (e) => {
        if (e.target && e.target.closest && e.target.closest('#ui')) return;
        dragging = true; lastX = e.clientX; lastY = e.clientY;
        vYaw = 0; vPitch = 0; document.body.style.cursor = 'grabbing';
      });
      addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - lastX, dy = e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
        const yaw = dx * DRAG_S, pitch = dy * DRAG_S;
        rotate(pitch, yaw); vYaw = yaw; vPitch = pitch;
      });
      const endDrag = () => { dragging = false; document.body.style.cursor = 'grab'; };
      addEventListener('pointerup', endDrag);
      addEventListener('pointercancel', endDrag);

      // ---- controls: logo toggle + size slider ----
      document.getElementById('seg').addEventListener('click', (e) => {
        const b = e.target.closest('button'); if (b) setLogo(b.dataset.logo, true);
      });
      document.getElementById('size').addEventListener('input', (e) => {
        screenEl.style.transform = 'scale(' + e.target.value + ')';
      });

      // ---- transition-style selector + replay ----
      const LOGO_ORDER = ['claude', 'openai', 'cute'];
      const nextLogo = () => LOGO_ORDER[(LOGO_ORDER.indexOf(currentKey) + 1) % LOGO_ORDER.length];
      function markStyle(s) {
        for (const b of document.querySelectorAll('#styleSeg button'))
          b.classList.toggle('on', b.dataset.style === s);
      }
      document.getElementById('styleSeg').addEventListener('click', (e) => {
        const b = e.target.closest('button'); if (!b) return;
        currentStyle = b.dataset.style; markStyle(currentStyle);
        setLogo(nextLogo(), true);          // instantly preview the chosen style
      });
      document.getElementById('replay').addEventListener('click', () => setLogo(nextLogo(), true));

      setLogo('claude');                  // initial logo (no transition)
      preload('openai'); preload('cute'); // warm the cache so swaps are instant
      loop();
    })();
  </script>
</body>

</html>
